<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aeBlog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-200 transition-colors">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-md border-b border-zinc-200 dark:border-zinc-800">
        <div class="max-w-6xl mx-auto px-6 py-4">
            <div id="nav-container" class="flex items-center justify-between gap-8 transition-all duration-300 overflow-x-auto pb-1 scrollbar-gutter-stable">
                <div class="flex gap-8 text-sm font-medium nav-left whitespace-nowrap">
                    <a href="#posts" class="hover:text-[#0068B5] dark:text-zinc-200 transition">碎碎念</a>
                    <a href="#contact" class="hover:text-[#0068B5] dark:text-zinc-200 transition">保持联系</a>
                </div>
                <div id="beijing-time" class="text-sm font-medium text-zinc-700 dark:text-zinc-200 tabular-nums whitespace-nowrap"></div>
            </div>
        </div>
    </nav>
    <button id="menu-toggle" class="fixed z-[999] w-11 h-11 bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-700 rounded-2xl flex items-center justify-center shadow-2xl cursor-move active:cursor-grabbing transition-all touch-none text-zinc-600 dark:text-zinc-400">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/>
            <line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/>
            <line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/>
            <line x1="17" y1="16" x2="23" y2="16"/>
        </svg>
    </button>
    <section id="posts" class="pt-24 pb-24">
        <div class="max-w-5xl mx-auto px-6">
            <h2 class="text-4xl font-serif tracking-normal mb-12 text-center text-zinc-800 dark:text-zinc-100">近期碎碎念 & 归档</h2>
            <div id="post-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 min-h-[300px] items-start">
                <div id="loading-spinner" class="col-span-full py-20 flex flex-col items-center gap-4">
                    <div class="w-10 h-10 border-4 border-zinc-200 border-t-[#0068B5] rounded-full animate-spin"></div>
                    <p class="text-sm text-zinc-400 font-medium tracking-wider">正在翻阅旧账...</p>
                </div>
            </div>
        </div>
    </section>
    <section id="contact" class="py-24 bg-white dark:bg-zinc-900 border-t border-zinc-100 dark:border-zinc-800">
        <div class="max-w-md mx-auto text-center px-6">
            <h2 class="text-4xl font-serif tracking-normal mb-8">在这里找到我</h2>
            <div class="flex justify-center items-center gap-12">
                <a href="mailto:teada2024@163.com" class="text-zinc-400 hover:text-[#0068B5] dark:hover:text-white transition-colors" title="163 Mail">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                    </svg>
                </a>
                <a href="mailto:xfchd090909@gmail.com" class="text-zinc-400 hover:text-[#0068B5] dark:hover:text-white transition-colors" title="Gmail">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 13V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v12c0 1.1.9 2 2 2h8"/>
                        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                        <path d="M19 16v6"/><path d="M16 19h6"/>
                    </svg>
                </a>
            </div>
        </div>
    </section>
    <div id="theme-menu" class="fixed top-0 right-0 h-full w-72 bg-white dark:bg-zinc-900 border-l border-zinc-200 dark:border-zinc-700 shadow-2xl z-[999] flex flex-col">
        <div class="p-6 flex justify-between items-center border-b border-zinc-200 dark:border-zinc-700">
            <span class="text-lg font-medium">界面配置</span>
            <button id="menu-close" class="text-3xl leading-none text-zinc-400 hover:text-black dark:hover:text-white">×</button>
        </div>
        <div class="flex-1 p-8">
            <div class="text-xs font-bold text-zinc-400 mb-6 tracking-widest uppercase">外观主题</div>
            <div class="flex justify-around items-center mb-12">
                <button onclick="switchTheme('light')" class="flex flex-col items-center gap-4 text-zinc-500 hover:text-black dark:text-zinc-400 dark:hover:text-white transition">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="5"></circle>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                    </svg>
                    <span class="text-xs">浅色</span>
                </button>
                <button onclick="switchTheme('dark')" class="flex flex-col items-center gap-4 text-zinc-500 hover:text-black dark:text-zinc-400 dark:hover:text-white transition">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <span class="text-xs">深色</span>
                </button>
            </div>
            
            <div id="nsfw-setting" class="hidden justify-between items-center pt-8 border-t border-zinc-100 dark:border-zinc-800">
                <div class="flex flex-col">
                    <span class="text-sm font-medium">Not Safe For Work</span>
                    <span class="text-[10px] text-zinc-400">显示受限内容</span>
                </div>
                <button id="nsfw-toggle" class="w-11 h-6 rounded-full bg-zinc-200 dark:bg-zinc-700 relative transition-all duration-300 shadow-inner">
                    <div id="nsfw-knob" class="w-4 h-4 bg-white rounded-full absolute top-1 left-1 transition-transform duration-300 shadow-sm"></div>
                </button>
            </div>

            <!-- 整合新增的意见反馈模块 -->
            <div class="pt-6 mt-6 border-t border-zinc-100 dark:border-zinc-800">
                <a href="https://aeblogfb.netlify.app" target="_blank" class="flex items-center justify-center gap-2 w-full py-3 px-4 bg-zinc-50 dark:bg-zinc-800/50 hover:bg-zinc-100 dark:hover:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-xl text-sm font-medium transition-all group">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-zinc-400 group-hover:text-[#0068B5] transition-colors">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span>意见反馈</span>
                </a>
            </div>
            <!-- 新增模块结束 -->

        </div>
    </div>
    <div id="nsfw-modal" class="fixed inset-0 z-[2000] hidden items-center justify-center p-4 bg-black/60 backdrop-blur-sm transition-opacity duration-300">
        <div id="nsfw-modal-content" class="bg-white dark:bg-zinc-900 w-full max-w-md rounded-2xl p-8 shadow-2xl border border-zinc-200 dark:border-zinc-800 transform transition-all scale-95 opacity-0">
            <h3 class="text-xl font-bold text-zinc-900 dark:text-zinc-100 mb-4">NSFW内容警告</h3>
            <div class="space-y-4 text-sm leading-relaxed text-zinc-600 dark:text-zinc-400">
                <p>如果您看到此提示，说明我们检测到你的当前位置处于内容审查较为宽松的地区，若你的使用行为符合相关法律法规，你可自行选择开启该功能。</p>
                <p>但若你通过反审查工具绕过内容审查严格地区的限制，请务必谨慎及评估自身行为，并选择关闭，如果你执意开启，我们将不对任何因违规操作而产生的后果承担责任。</p>
            </div>
            <div class="mt-8 flex gap-3">
                <button id="nsfw-cancel" class="flex-1 px-4 py-2.5 rounded-xl border border-zinc-200 dark:border-zinc-700 text-sm font-medium hover:bg-zinc-50 dark:hover:bg-zinc-800 transition">取消</button>
                <button id="nsfw-confirm" disabled class="flex-1 px-4 py-2.5 rounded-xl bg-red-500 text-white text-sm font-medium disabled:opacity-50 disabled:cursor-not-allowed transition-all">确认开启(5s)</button>
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
