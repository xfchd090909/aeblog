<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aeBlog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0068B5',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="transition-colors">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-md border-b border-zinc-200 dark:border-zinc-800">
        <div class="max-w-6xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex gap-8 text-sm font-medium">
                    <a href="#posts" class="hover:text-primary transition">文章</a>
                    <a href="#contact" class="hover:text-primary transition">联系</a>
                </div>
                <div id="beijing-time" class="text-sm font-mono text-zinc-500"></div>
            </div>
        </div>
    </nav>

    <button id="menu-toggle" class="fixed bottom-8 right-8 z-[1000] w-12 h-12 bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-full flex items-center justify-center shadow-xl hover:scale-110 transition-transform">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 8v8M8 12h8"></path>
        </svg>
    </button>

    <div id="theme-menu" class="fixed top-0 right-0 h-full w-72 z-[1001] shadow-2xl flex flex-col">
        <div class="p-6 flex justify-between items-center border-b border-zinc-200 dark:border-zinc-800">
            <span class="font-bold">设置中心</span>
            <button id="menu-close" class="text-2xl p-2">&times;</button>
        </div>
        <div class="p-8">
            <p class="text-xs uppercase tracking-widest text-zinc-400 mb-6">外观</p>
            <div class="flex gap-4">
                <button onclick="document.documentElement.classList.remove('dark')" class="flex-1 p-4 border rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800 transition">浅色</button>
                <button onclick="document.documentElement.classList.add('dark')" class="flex-1 p-4 border rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800 transition">深色</button>
            </div>
        </div>
    </div>

    <main class="pt-24 max-w-5xl mx-auto px-6">
        <h2 class="section-title text-3xl mb-12">多读两篇文章...</h2>
        
        <div class="info-box">
            <h3 class="font-bold mb-2">这是一段受限信息</h3>
            <p>由于安全或隐私设置，此段文字默认不可见。请将鼠标悬停在此处以显示内容。</p>
        </div>

        <div id="post-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <script src="js/main.js"></script>
    <script>
        // 侧边栏开关逻辑修复
        const menu = document.getElementById('theme-menu');
        const toggle = document.getElementById('menu-toggle');
        const close = document.getElementById('menu-close');

        toggle.addEventListener('click', () => menu.classList.add('active'));
        close.addEventListener('click', () => menu.classList.remove('active'));
    </script>
</body>
</html>
