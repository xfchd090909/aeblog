<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>aeBlog</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { visibility: hidden; }
    #loader { visibility: visible; position: fixed; inset: 0; background: #dde8f3; z-index: 10000; }
    html.dark-theme #loader { background: #0f172a; }

    /* ==================== 主页与阅读区彻底隔离 ==================== */
    #content-page {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
    }
    .view {
      position: absolute;
      inset: 0;
      transition: opacity 0.75s cubic-bezier(0.4, 0, 0.2, 1), transform 0.75s cubic-bezier(0.32, 0.72, 0, 1);
    }
    #list-view {
      opacity: 1;
      transform: translateX(0);
    }
    #reader-view {
      opacity: 0;
      transform: translateX(60px);
      pointer-events: none;
      overflow: hidden;
    }
    #reader-view.active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    /* ==================== 标题独立飞出动画 ==================== */
    #flying-title {
      position: fixed;
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--text);
      pointer-events: none;
      z-index: 99999;
      opacity: 0;
      transition: all 0.75s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-shadow: 0 2px 10px rgba(0,0,0,0.15);
    }

    /* ==================== 阅读区头部（无白框、协调主题） ==================== */
    #reader-header {
      padding: 24px 28px;
      background: var(--card-bg);
      color: var(--text);
      position: sticky;
      top: 0;
      z-index: 10;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    #reader-header.shrunk {
      padding: 14px 24px;
      font-size: 1.18rem;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }

    /* ==================== 阅读区主体 - 动态高度 + 完整显示 ==================== */
    #reader-body {
      padding: 40px;
      overflow-y: auto;
      height: calc(100vh - 74px);
      scrollbar-width: thin;
      scrollbar-color: var(--accent) transparent;
    }
    #reader-body::-webkit-scrollbar {
      width: 6px;
    }
    #reader-body::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 3px;
    }
    .markdown-content {
      line-height: 1.85;
      font-size: 1.05rem;
      opacity: 0;
      animation: fadeInContent 0.9s forwards 0.3s;
    }
    @keyframes fadeInContent {
      to { opacity: 1; }
    }

    /* 返回按钮 */
    .reader-back {
      font-size: 32px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .reader-back:hover {
      transform: rotate(90deg) scale(1.15);
    }
  </style>
  <script>
    if (sessionStorage.getItem('theme') === 'dark') {
      document.documentElement.classList.add('dark-theme');
    }
  </script>
</head>
<body>
  <div id="loader"></div>
  <div id="theme-canvas"></div>

  <!-- NSFW 弹窗（红色） -->
  <div id="custom-modal" class="modal-overlay">
    <div class="modal-card">
      <span class="modal-icon">warning</span>
      <h3>限制内容警告</h3>
      <p>如果你能看到此提示，说明我们检测到你的位置处于网络审查宽松的环境下，如果符合相关规范，你可以选择开启<br><br>但如果你使用了用于越过网络审查的工具访问本站打开限制内容产生的后果我们概不负责!<br></p>
      <div class="modal-actions">
        <button class="modal-btn btn-secondary" onclick="closeNsfwModal()">取消</button>
        <button class="modal-btn btn-primary" onclick="confirmNsfw()">开启限制内容</button>
      </div>
    </div>
  </div>

  <!-- 需要监护人指导 独立弹窗（黄色） -->
  <div id="parental-modal" class="modal-overlay">
    <div class="modal-card">
      <span class="modal-icon parental-icon">warning</span>
      <h3>限制内容警告</h3>
      <p>如果你能看到此提示，说明我们检测到你的位置处于网络审查有部分限制的环境下，如果符合相关规范，你应该谨慎选择开启，这个行为不代表你可以观看NSFW级内容，我们也不建议这样做，但可以看到未被限制且你认为合法的信息</p>
      <div class="modal-actions">
        <button class="modal-btn btn-secondary" onclick="closeParentalModal()">取消</button>
        <button class="modal-btn btn-primary" onclick="confirmParental()">开启限制内容</button>
      </div>
    </div>
  </div>

  <main class="container">
    <section id="content-page" class="page active">
      <!-- 主页列表区（完全独立） -->
      <div id="list-view" class="view">
        <div id="blog-container"></div>
      </div>

      <!-- 阅读区（同页切换） -->
      <div id="reader-view" class="view">
        <div id="reader-header">
          <h3 id="reader-title" style="margin:0; font-size:1.6rem; font-weight:600;"></h3>
          <span class="reader-back link-icon" onclick="closeReader()">close</span>
        </div>
        <div id="reader-body">
          <div id="reader-markdown" class="markdown-content"></div>
        </div>
      </div>
    </section>

    <section id="settings-page" class="page">
      <h2 id="settings-title"></h2>
      <div id="settings-list"></div>
    </section>
  </main>

  <nav class="menu" role="navigation" aria-label="主导航">
    <a href="#" class="link active" data-target="content-page">
      <span class="link-icon">dashboard</span>
      <span class="link-title">内容</span>
    </a>
    <a href="#" class="link" data-target="settings-page">
      <span class="link-icon">settings</span>
      <span class="link-title">设置</span>
    </a>
  </nav>

  <script src="data.js"></script>
  <script src="countries.js"></script>
  <script src="restricted.js"></script>
  <script>
    let userCountry = "";
    let isParentalEnabled = sessionStorage.getItem('parental') !== 'disabled';
    let isNsfwEnabled = sessionStorage.getItem('nsfw') === 'enabled';

    const links = document.querySelectorAll('.link');
    const pages = document.querySelectorAll('.page');
    const canvas = document.getElementById('theme-canvas');
    const nsfwModal = document.getElementById('custom-modal');
    const parentalModal = document.getElementById('parental-modal');
    const listView = document.getElementById('list-view');
    const readerView = document.getElementById('reader-view');
    const readerHeader = document.getElementById('reader-header');
    const readerTitle = document.getElementById('reader-title');
    const readerMarkdown = document.getElementById('reader-markdown');

    let flyingTitle = null;

    async function initApp() {
      if (sessionStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-theme');
      }
      try {
        const response = await fetch('/.netlify/functions/get-ip');
        const data = await response.json();
        userCountry = data.country || "UNKNOWN";
      } catch (e) {
        userCountry = "UNKNOWN";
      } finally {
        await renderBlog();
        renderSettings();
        document.body.style.visibility = "visible";
        document.getElementById('loader').style.display = "none";
      }
    }

    async function renderBlog() {
      const container = document.getElementById('blog-container');
      container.innerHTML = '';

      for (const post of blogData) {
        const cardHTML = `
          <article class="card" onclick="openReader(${post.id}, event)" style="cursor:pointer;">
            <h3>${post.title}</h3>
            <p class="date">${post.date}</p>
            <span class="badge ${getTagClass(post.tag)}">${post.tag}</span>
          </article>
        `;
        container.innerHTML += cardHTML;
      }
    }

    // ==================== 标题独立飞出 + 主页渐隐 + 阅读区滑入 ====================
    async function openReader(id, e) {
      const post = blogData.find(p => p.id === id);
      if (!post) return;

      // 1. 独立飞出标题
      const cardTitleEl = e.currentTarget.querySelector('h3');
      const rect = cardTitleEl.getBoundingClientRect();

      flyingTitle = document.createElement('div');
      flyingTitle.id = 'flying-title';
      flyingTitle.textContent = post.title;
      flyingTitle.style.left = rect.left + 'px';
      flyingTitle.style.top = rect.top + 'px';
      flyingTitle.style.width = rect.width + 'px';
      document.body.appendChild(flyingTitle);

      requestAnimationFrame(() => {
        const targetRect = readerTitle.getBoundingClientRect();
        flyingTitle.style.left = targetRect.left + 'px';
        flyingTitle.style.top = targetRect.top + 'px';
        flyingTitle.style.fontSize = '1.6rem';
        flyingTitle.style.opacity = '0';
      });

      // 2. 主页列表渐隐
      listView.style.transition = 'opacity 0.75s cubic-bezier(0.4, 0, 0.2, 1)';
      listView.style.opacity = '0';

      // 3. 加载 Markdown
      let mdContent = '';
      try {
        const res = await fetch(`/posts/${post.filename}`);
        if (res.ok) mdContent = await res.text();
      } catch (e) {
        mdContent = post.content || '无法加载文章内容';
      }
      readerMarkdown.innerHTML = marked.parse(mdContent);
      readerTitle.textContent = post.title;

      // 4. 显示阅读区
      setTimeout(() => {
        readerView.classList.add('active');
        document.getElementById('reader-body').scrollTop = 0;
        readerHeader.classList.remove('shrunk');
      }, 350);

      // 清理飞出标题
      setTimeout(() => {
        if (flyingTitle) {
          flyingTitle.remove();
          flyingTitle = null;
        }
      }, 1100);
    }

    function closeReader() {
      readerView.classList.remove('active');
      listView.style.opacity = '1';
    }

    // ==================== 滚动时标题吸附缩小 ====================
    document.getElementById('reader-body').addEventListener('scroll', () => {
      if (document.getElementById('reader-body').scrollTop > 80) {
        readerHeader.classList.add('shrunk');
      } else {
        readerHeader.classList.remove('shrunk');
      }
    });

    function renderSettings() {
      const isDark = document.body.classList.contains('dark-theme');
      document.getElementById('settings-title').textContent = settingsData.title;
      const list = document.getElementById('settings-list');
      let settingsHtml = '';
      settingsData.categories.forEach(category => {
        settingsHtml += `<div class="settings-category"><h3 class="settings-category-title">${category.title}</h3>`;
        if (category.id === 'content' && RESTRICTED_COUNTRIES.includes(userCountry)) {
          settingsHtml += `<div class="settings-local-tip">当前内容已符合当地规范，无需调整</div>`;
        } else {
          const filteredOptions = category.options.filter(opt => {
            if (["CN", "China"].includes(userCountry) && opt.id === "nsfw_filter") return false;
            if (RESTRICTED_COUNTRIES.includes(userCountry) && (opt.id === "parental_filter" || opt.id === "nsfw_filter")) return false;
            return true;
          });
          filteredOptions.forEach(opt => {
            if (opt.type === 'theme-toggle') {
              settingsHtml += `<div class="setting-item"><span>${opt.label}</span><button class="toggle-btn ${isDark ? 'active' : ''}" id="${opt.id}" onclick="toggleTheme(event)"><div class="toggle-thumb"></div></button></div>`;
            } else if (opt.type === 'toggle') {
              let isActive = (opt.id === 'parental_filter') ? isParentalEnabled : isNsfwEnabled;
              settingsHtml += `<div class="setting-item"><span>${opt.label}</span><button class="toggle-btn ${isActive ? 'active' : ''}" id="${opt.id}" onclick="handleContentToggle(event)"><div class="toggle-thumb"></div></button></div>`;
            } else {
              settingsHtml += `<div class="setting-item"><span>${opt.label}</span><div>[ 待开发 ]</div></div>`;
            }
          });
        }
        if (category.id === 'content') {
          const displayCountry = countryMap[userCountry] || `未知地区 (${userCountry}) 🌐`;
          settingsHtml += `<div class="settings-country-info">当前检测到的国家/地区：<strong>${displayCountry}</strong></div>`;
        }
        settingsHtml += `</div>`;
      });
      list.innerHTML = settingsHtml;
    }

    function toggleTheme(event) {
      const btn = event.currentTarget;
      const isNowDark = document.body.classList.toggle('dark-theme');
      document.documentElement.classList.toggle('dark-theme', isNowDark);
      btn.classList.toggle('active');
      sessionStorage.setItem('theme', isNowDark ? 'dark' : 'light');

      const rect = btn.getBoundingClientRect();
      const x = rect.left + rect.width / 2;
      const y = rect.top + rect.height / 2;
      document.documentElement.style.setProperty('--ripple-angle', `${Math.floor(Math.random() * 360)}deg`);
      canvas.style.left = `${x}px`;
      canvas.style.top = `${y}px`;
      canvas.classList.remove('animate');
      void canvas.offsetWidth;
      canvas.classList.add('animate');
    }

    function handleContentToggle(event) {
      const btn = event.currentTarget;
      const toggleId = btn.id;
      const isCurrentlyEnabled = (toggleId === 'parental_filter') ? isParentalEnabled : isNsfwEnabled;

      if (!isCurrentlyEnabled) {
        if (toggleId === 'parental_filter') {
          parentalModal.classList.add('active');
        } else {
          nsfwModal.classList.add('active');
        }
      } else {
        if (toggleId === 'parental_filter') {
          isParentalEnabled = false;
          sessionStorage.setItem('parental', 'disabled');
        } else {
          isNsfwEnabled = false;
          sessionStorage.setItem('nsfw', 'disabled');
        }
        btn.classList.remove('active');
        renderBlog();
      }
    }

    function confirmParental() {
      isParentalEnabled = true;
      sessionStorage.setItem('parental', 'enabled');
      closeParentalModal();
      renderSettings();
      renderBlog();
    }

    function confirmNsfw() {
      isNsfwEnabled = true;
      sessionStorage.setItem('nsfw', 'enabled');
      closeNsfwModal();
      renderSettings();
      renderBlog();
    }

    function closeParentalModal() { parentalModal.classList.remove('active'); }
    function closeNsfwModal() { nsfwModal.classList.remove('active'); }

    function getTagClass(tag) {
      if (tag === "适合全年龄") return "tag-green";
      if (tag === "需要监护人指导") return "tag-yellow";
      if (tag === "不适合工作场景") return "tag-red";
      return "";
    }

    links.forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const targetId = link.getAttribute('data-target');
        links.forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        pages.forEach(page => {
          page.classList.toggle('active', page.id === targetId);
          if (targetId === 'settings-page' && page.id === targetId) renderSettings();
        });
      });
    });

    initApp();
  </script>
</body>
</html>
