<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>aeBlog</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css">
  <style>
    /* 初始锁定状态，不输出任何文字 */
    body { visibility: hidden; }
    #loader { visibility: visible; position: fixed; inset: 0; background: #dde8f3; z-index: 10000; }
    body.dark-theme #loader { background: #0f172a; }
  </style>
</head>
<body>
  <div id="loader"></div>
  <div id="theme-canvas"></div>

  <main class="container">
    <section id="content-page" class="page active">
      <div id="blog-container"></div>
    </section>
    <section id="settings-page" class="page">
      <h2 id="settings-title"></h2>
      <div id="settings-list"></div>
    </section>
  </main>

  <nav class="menu" role="navigation">
    <a href="#" class="link active" data-target="content-page">
      <span class="link-icon">dashboard</span>
      <span class="link-title">内容</span>
    </a>
    <a href="#" class="link" data-target="settings-page">
      <span class="link-icon">settings</span>
      <span class="link-title">设置</span>
    </a>
  </nav>

  <script src="data.js"></script>
  <script>
    let userCountry = "";
    const links = document.querySelectorAll('.link');
    const pages = document.querySelectorAll('.page');
    const canvas = document.getElementById('theme-canvas');

    async function initApp() {
      try {
        const response = await fetch('/.netlify/functions/get-ip');
        const data = await response.json();
        userCountry = data.country;
      } catch (e) {
        userCountry = "UNKNOWN";
      } finally {
        renderBlog();
        renderSettings();
        document.body.style.visibility = "visible";
        document.getElementById('loader').style.display = "none";
      }
    }

    function renderBlog() {
      const container = document.getElementById('blog-container');
      const filteredData = blogData.filter(post => {
        if (userCountry === "CN" || userCountry === "China") {
          return post.tag === "适合全年龄";
        }
        return true;
      });

      container.innerHTML = filteredData.map(post => `
        <article class="card">
          <h3>${post.title}</h3>
          <p class="date">${post.date}</p>
          <p class="excerpt">${post.content}</p>
          <span class="badge ${getTagClass(post.tag)}">${post.tag}</span>
        </article>
      `).join('');
    }

    function renderSettings() {
      document.getElementById('settings-title').textContent = settingsData.title;
      const list = document.getElementById('settings-list');
      
      const filteredOptions = settingsData.options.filter(opt => {
        if ((userCountry === "CN" || userCountry === "China") && opt.id === "nsfw_filter") {
          return false;
        }
        return true;
      });

      list.innerHTML = filteredOptions.map(opt => {
        if (opt.type === 'theme-toggle') {
          return `
            <div class="setting-item">
              <span>${opt.label}</span>
              <button class="toggle-btn" id="${opt.id}" onclick="toggleTheme(event)">
                <div class="toggle-thumb"></div>
              </button>
            </div>`;
        }
        return `
          <div class="setting-item">
            <span>${opt.label}</span>
            <div class="status-placeholder">[ 待开发 ]</div>
          </div>`;
      }).join('');
    }

    function getTagClass(tag) {
      if (tag === "适合全年龄") return "tag-green";
      if (tag === "需要监护人指导") return "tag-yellow";
      if (tag === "不适合工作场景") return "tag-red";
      return "";
    }

    function toggleTheme(event) {
      const btn = event.currentTarget;
      document.body.classList.toggle('dark-theme');
      btn.classList.toggle('active');
      const rect = btn.getBoundingClientRect();
      const x = rect.left + rect.width / 2;
      const y = rect.top + rect.height / 2;
      document.documentElement.style.setProperty('--ripple-angle', `${Math.floor(Math.random() * 360)}deg`);
      canvas.style.left = `${x}px`;
      canvas.style.top = `${y}px`;
      canvas.classList.remove('animate');
      void canvas.offsetWidth;
      canvas.classList.add('animate');
    }

    links.forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        links.forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        const targetId = link.getAttribute('data-target');
        pages.forEach(page => {
          page.classList.remove('active');
          if (page.id === targetId) setTimeout(() => page.classList.add('active'), 50);
        });
      });
    });

    initApp();
  </script>
</body>
</html>
