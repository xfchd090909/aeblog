<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>aeBlog</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css">
  <!-- marked.js 用于解析 Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { visibility: hidden; }
    #loader { visibility: visible; position: fixed; inset: 0; background: #dde8f3; z-index: 10000; }
    html.dark-theme #loader { background: #0f172a; }
    .markdown-content { line-height: 1.7; }
    .markdown-content h1, .markdown-content h2 { margin: 1em 0 0.5em; color: var(--accent); }
  </style>
  <script>
    if (sessionStorage.getItem('theme') === 'dark') {
      document.documentElement.classList.add('dark-theme');
    }
  </script>
</head>
<body>
  <div id="loader"></div>
  <div id="theme-canvas"></div>

  <!-- NSFW 弹窗（红色） -->
  <div id="custom-modal" class="modal-overlay">
    <div class="modal-card">
      <span class="modal-icon">warning</span>
      <h3>限制内容警告</h3>
      <p>如果你能看到此提示，说明我们检测到你的位置处于网络审查宽松的环境下，如果符合相关规范，你可以选择开启<br><br>但如果你使用了用于越过网络审查的工具访问本站打开限制内容产生的后果我们概不负责!<br></p>
      <div class="modal-actions">
        <button class="modal-btn btn-secondary" onclick="closeNsfwModal()">取消</button>
        <button class="modal-btn btn-primary" onclick="confirmNsfw()">开启限制内容</button>
      </div>
    </div>
  </div>

  <!-- 需要监护人指导 独立弹窗（黄色） -->
  <div id="parental-modal" class="modal-overlay">
    <div class="modal-card">
      <span class="modal-icon parental-icon">warning</span>
      <h3>限制内容警告</h3>
      <p>如果你能看到此提示，说明我们检测到你的位置处于网络审查有部分限制的环境下，如果符合相关规范，你应该谨慎选择开启，这个行为不代表你可以观看NSFW级内容，我们也不建议这样做，但可以看到未被限制且你认为合法的信息</p>
      <div class="modal-actions">
        <button class="modal-btn btn-secondary" onclick="closeParentalModal()">取消</button>
        <button class="modal-btn btn-primary" onclick="confirmParental()">开启限制内容</button>
      </div>
    </div>
  </div>

  <main class="container">
    <section id="content-page" class="page active">
      <div id="blog-container"></div>
    </section>
    <section id="settings-page" class="page">
      <h2 id="settings-title"></h2>
      <div id="settings-list"></div>
    </section>
  </main>

  <nav class="menu" role="navigation" aria-label="主导航">
    <a href="#" class="link active" data-target="content-page">
      <span class="link-icon">dashboard</span>
      <span class="link-title">内容</span>
    </a>
    <a href="#" class="link" data-target="settings-page">
      <span class="link-icon">settings</span>
      <span class="link-title">设置</span>
    </a>
  </nav>

  <script src="data.js"></script>
  <script src="countries.js"></script>
  <script src="restricted.js"></script>
  <script>
    let userCountry = "";
    let isParentalEnabled = sessionStorage.getItem('parental') !== 'disabled';
    let isNsfwEnabled = sessionStorage.getItem('nsfw') === 'enabled';

    const RESTRICTED_COUNTRIES = [ /* 原有列表保持不变 */ 
      "AU", "Australia", "MY", "Malaysia", "SG", "Singapore",
      "DE", "Germany",
      "AT", "Austria", "BE", "Belgium", "BG", "Bulgaria", "HR", "Croatia",
      "CY", "Cyprus", "CZ", "Czech Republic", "Czechia", "DK", "Denmark",
      "EE", "Estonia", "FI", "Finland", "FR", "France", "GR", "Greece",
      "HU", "Hungary", "IE", "Ireland", "IT", "Italy", "LV", "Latvia",
      "LT", "Lithuania", "LU", "Luxembourg", "MT", "Malta", "NL", "Netherlands",
      "PL", "Poland", "PT", "Portugal", "RO", "Romania", "SK", "Slovakia",
      "SI", "Slovenia", "ES", "Spain", "SE", "Sweden"
    ];

    const links = document.querySelectorAll('.link');
    const pages = document.querySelectorAll('.page');
    const canvas = document.getElementById('theme-canvas');
    const nsfwModal = document.getElementById('custom-modal');
    const parentalModal = document.getElementById('parental-modal');

    async function initApp() {
      if (sessionStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-theme');
      }
      try {
        const response = await fetch('/.netlify/functions/get-ip');
        const data = await response.json();
        userCountry = data.country || "UNKNOWN";
      } catch (e) {
        userCountry = "UNKNOWN";
      } finally {
        await renderBlog();
        renderSettings();
        document.body.style.visibility = "visible";
        document.getElementById('loader').style.display = "none";
      }
    }

    // ==================== 使用原有 data.js 作为索引 + 动态读取 Markdown ====================
    async function renderBlog() {
      const container = document.getElementById('blog-container');
      container.innerHTML = '';

      for (const post of blogData) {
        let mdContent = '';
        try {
          const res = await fetch(`/posts/${post.filename}`);
          if (res.ok) mdContent = await res.text();
        } catch (e) {
          mdContent = post.content || '无法加载文章内容';
        }

        const htmlContent = marked.parse(mdContent);

        const cardHTML = `
          <article class="card">
            <h3>${post.title}</h3>
            <p class="date">${post.date}</p>
            <div class="markdown-content">${htmlContent}</div>
            <span class="badge ${getTagClass(post.tag)}">${post.tag}</span>
          </article>
        `;
        container.innerHTML += cardHTML;
      }
    }

    function renderSettings() { /* 原代码不变 */ 
      const isDark = document.body.classList.contains('dark-theme');
      document.getElementById('settings-title').textContent = settingsData.title;
      const list = document.getElementById('settings-list');
      
      let settingsHtml = '';

      settingsData.categories.forEach(category => {
        settingsHtml += `
          <div class="settings-category">
            <h3 class="settings-category-title">${category.title}</h3>
        `;

        if (category.id === 'content' && RESTRICTED_COUNTRIES.includes(userCountry)) {
          settingsHtml += `
            <div class="settings-local-tip">当前内容已符合当地规范，无需调整</div>
          `;
        } else {
          const filteredOptions = category.options.filter(opt => {
            if (["CN", "China"].includes(userCountry) && opt.id === "nsfw_filter") return false;
            if (RESTRICTED_COUNTRIES.includes(userCountry) && (opt.id === "parental_filter" || opt.id === "nsfw_filter")) return false;
            return true;
          });

          filteredOptions.forEach(opt => {
            if (opt.type === 'theme-toggle') {
              settingsHtml += `
                <div class="setting-item">
                  <span>${opt.label}</span>
                  <button class="toggle-btn ${isDark ? 'active' : ''}" id="${opt.id}" onclick="toggleTheme(event)">
                    <div class="toggle-thumb"></div>
                  </button>
                </div>`;
            } 
            else if (opt.type === 'toggle') {
              let isActive = (opt.id === 'parental_filter') ? isParentalEnabled : isNsfwEnabled;
              settingsHtml += `
                <div class="setting-item">
                  <span>${opt.label}</span>
                  <button class="toggle-btn ${isActive ? 'active' : ''}" id="${opt.id}" onclick="handleContentToggle(event)">
                    <div class="toggle-thumb"></div>
                  </button>
                </div>`;
            }
            else {
              settingsHtml += `<div class="setting-item"><span>${opt.label}</span><div>[ 待开发 ]</div></div>`;
            }
          });
        }

        if (category.id === 'content') {
          const displayCountry = countryMap[userCountry] || `未知地区 (${userCountry}) 🌐`;
          settingsHtml += `
            <div class="settings-country-info">
              当前检测到的国家/地区：<strong>${displayCountry}</strong>
            </div>
          `;
        }
        settingsHtml += `</div>`;
      });
      list.innerHTML = settingsHtml;
    }

    /* toggleTheme、handleContentToggle、confirmParental、confirmNsfw、closeModal、getTagClass 等函数保持完全不变（与上一版本一致） */
    function toggleTheme(event) { /* ... 原代码 ... */ }
    function handleContentToggle(event) { /* ... 原代码 ... */ }
    function confirmParental() { /* ... 原代码 ... */ }
    function confirmNsfw() { /* ... 原代码 ... */ }
    function closeParentalModal() { parentalModal.classList.remove('active'); }
    function closeNsfwModal() { nsfwModal.classList.remove('active'); }

    function getTagClass(tag) {
      if (tag === "适合全年龄") return "tag-green";
      if (tag === "需要监护人指导") return "tag-yellow";
      if (tag === "不适合工作场景") return "tag-red";
      return "";
    }

    links.forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const targetId = link.getAttribute('data-target');
        links.forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        pages.forEach(page => {
          page.classList.toggle('active', page.id === targetId);
          if (targetId === 'settings-page' && page.id === targetId) renderSettings();
        });
      });
    });

    initApp();
  </script>
</body>
</html>
