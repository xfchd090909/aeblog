<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aeBlog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-zinc-950 text-zinc-200">
    <!-- 导航栏（左右已互换） -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-zinc-900/80 backdrop-blur-md border-b border-zinc-800">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <!-- 左侧：导航选项 -->
            <div class="flex gap-8 text-sm font-medium">
                <a href="#posts" class="hover:text-[#0068B5] transition">文章</a>
                <a href="#contact" class="hover:text-[#0068B5] transition">联系</a>
            </div>
            
            <!-- 右侧：实时北京时间 -->
            <div id="beijing-time" class="text-sm font-medium text-zinc-200 tabular-nums">
                load Beijing Time...
            </div>
        </div>
    </nav>

    <!-- 文章列表 -->
    <section id="posts" class="pt-24 pb-24">
        <div class="max-w-5xl mx-auto px-6">
            <h2 class="text-4xl font-serif tracking-normal mb-12 text-center">多读书有助进步...</h2>
            <div id="post-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>
    </section>

    <!-- 联系 -->
    <section id="contact" class="py-24 bg-zinc-900">
        <div class="max-w-md mx-auto text-center px-6">
            <h2 class="text-4xl font-serif tracking-normal mb-6">保持联系</h2>
            <p class="text-zinc-400">X: @xfchd2025</p>
        </div>
    </section>

    <script src="js/main.js"></script>
</body>
</html>
