<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XFCHD 的个人博客</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-zinc-950 text-zinc-200">
    <!-- 导航栏 -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-zinc-900/80 backdrop-blur-md border-b border-zinc-800">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-2xl font-bold tracking-tighter text-violet-400">XFCHD</div>
            <div class="flex gap-8 text-sm font-medium">
                <a href="#home" class="hover:text-violet-400 transition">首页</a>
                <a href="#about" class="hover:text-violet-400 transition">关于</a>
                <a href="#posts" class="hover:text-violet-400 transition">文章</a>
                <a href="#contact" class="hover:text-violet-400 transition">联系</a>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main id="main-content" class="pt-20">
        <!-- Hero / 关于我 / 文章列表 / 联系 部分保持不变（省略以节省篇幅，实际请复制您上一个版本的这部分） -->
        <!-- （此处内容与之前完全一致，只需保留原 Hero、about、posts、contact 即可） -->
    </main>

    <!-- 文章阅读弹窗（不变） -->
    <div id="post-modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-[100]">
        <div class="bg-zinc-900 rounded-3xl max-w-2xl w-full mx-4 overflow-hidden">
            <div class="p-8">
                <button onclick="closeModal()" class="float-right text-3xl leading-none">×</button>
                <h3 id="modal-title" class="text-3xl font-bold mb-4"></h3>
                <div id="modal-content" class="prose prose-invert max-w-none text-zinc-300"></div>
            </div>
        </div>
    </div>

    <!-- Cloudflare Turnstile 验证遮罩 -->
    <div id="verify-overlay" class="fixed inset-0 bg-black/90 flex items-center justify-center z-[999] hidden">
        <div class="bg-zinc-900 rounded-3xl p-10 max-w-md w-full mx-4 text-center">
            <h3 class="text-2xl font-semibold mb-6">请完成人机验证</h3>
            <div id="turnstile-container" class="flex justify-center mb-6"></div>
            <p id="verify-error" class="text-red-400 text-sm min-h-[1.25rem]"></p>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
