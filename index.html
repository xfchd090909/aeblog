<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menú Minimalista Mejorado</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css">
  <style>
    /* 阻塞层：静默检测时覆盖全身 */
    #blocker {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #dde8f3;
      z-index: 10000;
      transition: opacity 0.4s ease;
    }
    body.dark-theme #blocker { background: #0f172a; }
  </style>
</head>
<body>
  <div id="blocker"></div>
  <div id="theme-canvas"></div>

  <main class="container">
    <section id="content-page" class="page active">
      <div id="blog-container"></div>
    </section>

    <section id="settings-page" class="page">
      <h2 id="settings-title"></h2>
      <div id="settings-list"></div>
    </section>
  </main>

  <nav class="menu" role="navigation">
    <a href="#" class="link active" data-target="content-page">
      <span class="link-icon">dashboard</span>
      <span class="link-title">内容</span>
    </a>
    <a href="#" class="link" data-target="settings-page">
      <span class="link-icon">settings</span>
      <span class="link-title">设置</span>
    </a>
  </nav>

  <script src="data.js"></script>
  <script>
    let userCountry = "";
    const blocker = document.getElementById('blocker');

    async function init() {
      try {
        const response = await fetch('/.netlify/functions/get-ip');
        const data = await response.json();
        userCountry = data.country;
      } catch (e) {
        userCountry = "UNKNOWN";
      } finally {
        renderBlog();
        renderSettings();
        blocker.style.opacity = "0";
        setTimeout(() => blocker.style.display = "none", 400);
      }
    }

    function renderBlog() {
      const container = document.getElementById('blog-container');
      let filteredData = blogData;
      
      if (userCountry === "CN" || userCountry === "china") {
        filteredData = blogData.filter(post => 
          post.tag !== "不适合工作场景" && post.tag !== "需要监护人监督"
        );
      }

      container.innerHTML = filteredData.map(post => `
        <article class="card">
          <h3>${post.title}</h3>
          <p class="date">${post.date}</p>
          <p class="excerpt">${post.content}</p>
          <span class="badge ${getTagClass(post.tag)}">${post.tag}</span>
        </article>
      `).join('');
    }

    function renderSettings() {
      document.getElementById('settings-title').textContent = settingsData.title;
      const list = document.getElementById('settings-list');
      
      let options = settingsData.options;
      if (userCountry === "CN" || userCountry === "china") {
        options = options.filter(opt => opt.id !== "nsfw_filter");
      }

      list.innerHTML = options.map(opt => {
        if (opt.type === 'theme-toggle') {
          return `
            <div class="setting-item">
              <span>${opt.label}</span>
              <button class="toggle-btn" id="${opt.id}" onclick="toggleTheme(event)">
                <div class="toggle-thumb"></div>
              </button>
            </div>
          `;
        }
        return `
          <div class="setting-item">
            <span>${opt.label}</span>
            <div class="status-placeholder">[ 待开发 ]</div>
          </div>
        `;
      }).join('');
    }

    function getTagClass(tag) {
      if (tag === "适合全年龄") return "tag-green";
      if (tag === "需要监护人指导") return "tag-yellow";
      if (tag === "不适合工作场景") return "tag-red";
      return "";
    }

    function toggleTheme(event) {
      const btn = event.currentTarget;
      document.body.classList.toggle('dark-theme');
      btn.classList.toggle('active');
      const canvas = document.getElementById('theme-canvas');
      const rect = btn.getBoundingClientRect();
      canvas.style.left = `${rect.left + rect.width / 2}px`;
      canvas.style.top = `${rect.top + rect.height / 2}px`;
      document.documentElement.style.setProperty('--ripple-angle', `${Math.random() * 360}deg`);
      canvas.classList.remove('animate');
      void canvas.offsetWidth;
      canvas.classList.add('animate');
    }

    document.querySelectorAll('.link').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        document.querySelectorAll('.link').forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        const targetId = link.getAttribute('data-target');
        document.querySelectorAll('.page').forEach(page => {
          page.classList.remove('active');
          if (page.id === targetId) setTimeout(() => page.classList.add('active'), 50);
        });
      });
    });

    init();
  </script>
</body>
</html>
